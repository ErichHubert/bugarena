services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      CAPABILITY_PROVIDER_BASE_URL: http://capability-provider:8080
    init: true
    stdin_open: true
    tty: true
    working_dir: /workspace
    restart: unless-stopped
    volumes:
      - agent_workspace:/workspace
      - agent_codex:/home/agent/.codex
      - agent_cache:/home/agent/.cache
      - agent_config:/home/agent/.config
    networks:
      - agent-net

  capability-provider:
    build:
      context: .
      dockerfile: Dockerfile.capability-provider
    environment:
      ASPNETCORE_URLS: http://+:8080
      CapabilityBroker__ProviderConfigPath: /run/configs/capability-provider.providers.json
      CapabilityBroker__SecretBundlePath: /run/secrets/capability-provider-provider-secrets
    init: true
    restart: unless-stopped
    configs:
      - source: capability_provider_config
        target: /run/configs/capability-provider.providers.json
    secrets:
      - source: capability_provider_provider_secrets
        target: capability-provider-provider-secrets
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - agent-net

configs:
  capability_provider_config:
    file: ./config/capability-provider/providers.json

secrets:
  capability_provider_provider_secrets:
    file: ${CAPABILITY_PROVIDER_SECRETS_FILE:-./config/capability-provider/provider-secrets.placeholder.json}

volumes:
  agent_workspace:
  agent_codex:
  agent_cache:
  agent_config:

networks:
  agent-net:
    driver: bridge
