services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      CAPABILITY_BROKER_BASE_URL: http://capability-broker:8080
      BUGARENA_TESTINFRA_SERVICE_NAME: docker-daemon
      BUGARENA_TESTINFRA_DOCKER_HOST: tcp://docker-daemon:2375
      BUGARENA_TESTINFRA_TESTCONTAINERS_HOST_OVERRIDE: docker-daemon
      BUGARENA_TESTINFRA_TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
    init: true
    stdin_open: true
    tty: true
    working_dir: /workspace
    restart: unless-stopped
    volumes:
      - agent_workspace:/workspace
      - agent_codex:/home/agent/.codex
      - agent_cache:/home/agent/.cache
      - agent_config:/home/agent/.config
    networks:
      - agent-net
      - testinfra-net

  capability-broker:
    build:
      context: .
      dockerfile: Dockerfile.capability-broker
    environment:
      ASPNETCORE_URLS: http://+:8080
      CapabilityBroker__ProviderConfigPath: /run/configs/capability-broker.providers.json
      CapabilityBroker__SecretBundlePath: /run/secrets/capability-broker-provider-secrets
    init: true
    restart: unless-stopped
    configs:
      - source: capability_broker_config
        target: /run/configs/capability-broker.providers.json
    secrets:
      - source: capability_broker_provider_secrets
        target: capability-broker-provider-secrets
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - agent-net

  docker-daemon:
    image: docker:29.3.1-dind@sha256:4d90f1f6c400315c2dba96d3ec93c01e64198395cbba04f79d12adce4f737029
    privileged: true
    profiles:
      - testinfra
    environment:
      DOCKER_TLS_CERTDIR: ""
    command:
      - --host=tcp://0.0.0.0:2375
      - --host=unix:///var/run/docker.sock
      - --tls=false
    init: true
    restart: unless-stopped
    volumes:
      - docker_daemon_data:/var/lib/docker
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - testinfra-net

configs:
  capability_broker_config:
    file: ./config/capability-broker/providers.json

secrets:
  capability_broker_provider_secrets:
    file: ${CAPABILITY_BROKER_SECRETS_FILE:-./config/capability-broker/provider-secrets.placeholder.json}

volumes:
  agent_workspace:
  agent_codex:
  agent_cache:
  agent_config:
  docker_daemon_data:

networks:
  agent-net:
    driver: bridge
  testinfra-net:
    driver: bridge
