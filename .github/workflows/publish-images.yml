name: Bugarena - Publish Images

on:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.id }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Validate release contract
        id: validate
        env:
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [ "${RELEASE_PRERELEASE}" = "true" ]; then
            echo "Prereleases are intentionally not published to GHCR." >&2
            exit 1
          fi

          if ! printf '%s\n' "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tag '${RELEASE_TAG}' must match vX.Y.Z." >&2
            exit 1
          fi

          git fetch --no-tags --force origin refs/heads/main:refs/remotes/origin/main

          tag_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "Release tag '${RELEASE_TAG}' must point to a commit reachable from origin/main." >&2
            exit 1
          fi

          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

  publish-images:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: validate-release
    environment:
      name: release-publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Capability Broker Image
            image: ghcr.io/erichhubert/bugarena-capability-broker
            dockerfile: infra/docker/Dockerfile.capability-broker
            cache_scope: capability-broker
          - name: Agent Image
            image: ghcr.io/erichhubert/bugarena-agent
            dockerfile: infra/docker/Dockerfile.agent
            cache_scope: agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.validate-release.outputs.release_tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ needs.validate-release.outputs.release_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.validate-release.outputs.release_tag }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: mode=max
          sbom: true
