name: Bugarena - Security Scan

env:
  TRIVY_VERSION: v0.69.3

on:
  schedule:
    - cron: "30 5 * * 1"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/security-scan.yml"
      - "Bugarena.sln"
      - "agent/**"
      - "src/CapabilityBroker/**"
      - "Dockerfile.agent"
      - "Dockerfile.capability-broker"
      - "compose.agent.yml"
      - "docker-entrypoint.sh"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trivy-agent-image-scan:
    name: Trivy Agent Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build agent image
        run: docker build -f Dockerfile.agent -t bugarena-agent:ci .

      - name: Trivy scan agent image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: image
          image-ref: bugarena-agent:ci
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  trivy-capability-broker-image-scan:
    name: Trivy Capability Broker Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build capability broker image
        run: docker build -f Dockerfile.capability-broker -t bugarena-capability-broker:ci .

      - name: Trivy scan capability broker image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: image
          image-ref: bugarena-capability-broker:ci
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  trivy-docker-daemon-image-scan:
    name: Trivy Docker Daemon Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve docker-daemon image from compose
        id: docker_daemon_image
        run: |
          image="$(docker compose -f compose.agent.yml --profile testinfra config --format json | jq -r '.services["docker-daemon"].image // empty')"
          if [ -z "$image" ]; then
            echo "Failed to resolve docker-daemon image from compose.agent.yml" >&2
            exit 1
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Pull docker-daemon image
        run: docker pull "${{ steps.docker_daemon_image.outputs.image }}"

      - name: Trivy scan docker-daemon image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: image
          image-ref: ${{ steps.docker_daemon_image.outputs.image }}
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  sbom:
    name: SBOM (Syft)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sbom-spdx
          path: sbom-spdx.json
          retention-days: 7
